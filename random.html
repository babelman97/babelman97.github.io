<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨機數產生器</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .button {
            padding: 20px 40px;
            font-size: 24px;
            margin-top: 10px;
            cursor: pointer;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 10px;
        }
        .number {
            font-size: 36px;
            color: #333;
            margin-top: 10px;
        }
        .input-field {
            margin: 10px 0;
            font-size: 18px;
            padding: 10px;
            width: 80px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div>最小數字　<input type="number" class="input-field" id="minValue" placeholder="000"></div>
    <div>最大數字　<input type="number" class="input-field" id="maxValue" placeholder="999"></div>
    <div>隨機個數　<input type="number" class="input-field" id="count" placeholder="1"></div>
    <button class="button" onclick="generateRandomNumbers()">產生隨機數</button>
    <div class="number" id="randomNumbers"></div>

    <script>
        /**
         * Generates unique random numbers within a specified range.
         * Optimization: Uses an "exclusion" strategy when the requested count is a large
         * fraction of the total range to avoid the performance degradation of
         * rejection sampling (high collision rates in Set.add).
         */
        function generateRandomNumbers() {
            let minValue = parseInt(document.getElementById('minValue').value);
            let maxValue = parseInt(document.getElementById('maxValue').value);
            let count = parseInt(document.getElementById('count').value);

            let n = maxValue - minValue + 1;
            if (isNaN(minValue) || isNaN(maxValue) || isNaN(count) || minValue >= maxValue || count <= 0 || count > n) {
                document.getElementById('randomNumbers').innerText = '請確保輸入正確的數值範圍和數量';
                return;
            }

            let result;
            // If requested count is more than 2/3 of the total range,
            // it's faster to pick numbers to exclude.
            if (count > (n * 2) / 3) {
                let excludeCount = n - count;
                let excluded = new Set();
                while (excluded.size < excludeCount) {
                    let randomNumber = Math.floor(Math.random() * n) + minValue;
                    excluded.add(randomNumber);
                }

                result = new Array(count);
                let j = 0;
                for (let i = 0; i < n; i++) {
                    let val = i + minValue;
                    if (!excluded.has(val)) {
                        result[j++] = val;
                    }
                }

                // Fisher-Yates shuffle to ensure random distribution
                for (let i = result.length - 1; i > 0; i--) {
                    let j = Math.floor(Math.random() * (i + 1));
                    let temp = result[i];
                    result[i] = result[j];
                    result[j] = temp;
                }
            } else {
                // Standard rejection sampling for low/medium density
                let randomNumbers = new Set();
                while (randomNumbers.size < count) {
                    let randomNumber = Math.floor(Math.random() * n) + minValue;
                    randomNumbers.add(randomNumber);
                }
                result = Array.from(randomNumbers);
            }

            document.getElementById('randomNumbers').innerText = result.join(', ');
        }
    </script>
</body>
</html>
