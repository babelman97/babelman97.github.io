<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨機數產生器</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .button {
            padding: 20px 40px;
            font-size: 24px;
            margin-top: 10px;
            cursor: pointer;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 10px;
        }
        .number {
            font-size: 36px;
            color: #333;
            margin-top: 10px;
        }
        .input-field {
            margin: 10px 0;
            font-size: 18px;
            padding: 10px;
            width: 80px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div>最小數字　<input type="number" class="input-field" id="minValue" placeholder="000"></div>
    <div>最大數字　<input type="number" class="input-field" id="maxValue" placeholder="999"></div>
    <div>隨機個數　<input type="number" class="input-field" id="count" placeholder="1"></div>
    <button class="button" onclick="generateRandomNumbers()">產生隨機數</button>
    <div class="number" id="randomNumbers"></div>

    <script>
        function generateRandomNumbers() {
            let minValue = parseInt(document.getElementById('minValue').value);
            let maxValue = parseInt(document.getElementById('maxValue').value);
            let count = parseInt(document.getElementById('count').value);
            let results = [];

            const range = maxValue - minValue + 1;

            if (isNaN(minValue) || isNaN(maxValue) || isNaN(count) || minValue >= maxValue || count <= 0 || count > range) {
                document.getElementById('randomNumbers').innerText = '請確保輸入正確的數值範圍和數量';
                return;
            }

            // Performance Optimization: Hybrid strategy for unique random selection
            // Use exclusion strategy if count is more than 50% of the range to avoid "coupon collector's problem"
            if (count > range / 2) {
                // Initialize full range
                let allNumbers = Array.from({ length: range }, (_, i) => minValue + i);
                let toRemove = range - count;
                // Randomly remove elements until we have the desired count
                while (toRemove > 0) {
                    const idx = Math.floor(Math.random() * allNumbers.length);
                    // O(1) removal: swap with last element and pop
                    allNumbers[idx] = allNumbers[allNumbers.length - 1];
                    allNumbers.pop();
                    toRemove--;
                }
                results = allNumbers;
            } else {
                // Rejection sampling for sparse requests
                let randomSet = new Set();
                while (randomSet.size < count) {
                    let randomNumber = Math.floor(Math.random() * range) + minValue;
                    randomSet.add(randomNumber);
                }
                results = Array.from(randomSet);
            }

            document.getElementById('randomNumbers').innerText = results.join(', ');
        }
    </script>
</body>
</html>
